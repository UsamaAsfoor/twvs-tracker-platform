# Fly.io app config — see https://fly.io/docs/reference/configuration/
app = "twvs-tracker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  TWVS_REPO_ROOT = "/app"
  TWVS_DATA_DIR = "/data"
  TWVS_SCRIPTS_DIR = "/app/scripts"
  TWVS_SESSION_DIR = "/data/browser_session"
  TWVS_DOWNLOADS_DIR = "/data/downloads_temp"
  SCRAPE_INTERVAL_HOURS = "24"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/api/health"

[[mounts]]
  source = "twvs_data"
  destination = "/data"
  initial_size = "1gb"

[[vm]]
  memory = "2048mb"
  cpu_kind = "shared"
  cpus = 2
